<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&euml;stu Comply &mdash; Login Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: #000; }

  .screen { flex: 1; overflow: hidden; position: relative; display: flex; }

  /* ============================================================ */
  /* CONCEPT D — THE VAULT                                         */
  /* ============================================================ */
  .vault {
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0D1F15 0%, #1B4332 40%, #1a3a2a 100%);
    position: relative; overflow: hidden;
  }

  /* Hex grid background */
  .vault-grid {
    position: absolute; inset: 0; opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='30,2 56,15 56,37 30,50 4,37 4,15' fill='none' stroke='%23D4A843' stroke-width='0.5'/%3E%3C/svg%3E");
    background-size: 60px 52px;
  }

  /* Radial glow behind shield */
  .vault-glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,67,0.1) 0%, rgba(64,145,108,0.05) 40%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: glow-pulse 4s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
  }

  .vault-content { position: relative; z-index: 1; text-align: center; width: 380px; }

  /* Morphing shield */
  .vault-morph { width: 100px; height: 140px; margin: 0 auto 28px; position: relative; }
  .vault-morph-shield { width: 100px; height: 120px; position: relative; }
  .vault-morph-shield svg { width: 100%; height: 100%; filter: drop-shadow(0 0 24px rgba(212,168,67,0.15)); }

  .m-bg { animation: m-bg-anim 18s ease-in-out infinite; }
  .m-stroke { animation: m-stroke-anim 18s ease-in-out infinite; }
  .m-fp { animation: m-fp-anim 18s ease-in-out infinite; }
  .m-fp-dim { animation: m-fpdim-anim 18s ease-in-out infinite; }

  @keyframes m-bg-anim {
    0%,14% { fill: rgba(64,145,108,0.15); } 17%,30% { fill: rgba(220,38,38,0.12); }
    33%,47% { fill: rgba(123,104,238,0.12); } 50%,64% { fill: rgba(230,126,34,0.1); }
    67%,80% { fill: rgba(59,130,246,0.1); } 83%,97% { fill: rgba(8,145,178,0.1); }
    100% { fill: rgba(64,145,108,0.15); }
  }
  @keyframes m-stroke-anim {
    0%,14% { stroke: #40916C; } 17%,30% { stroke: #DC2626; }
    33%,47% { stroke: #7B68EE; } 50%,64% { stroke: #E67E22; }
    67%,80% { stroke: #3B82F6; } 83%,97% { stroke: #0891B2; }
    100% { stroke: #40916C; }
  }
  @keyframes m-fp-anim {
    0%,14% { stroke: rgba(64,145,108,0.7); } 17%,30% { stroke: rgba(220,38,38,0.7); }
    33%,47% { stroke: rgba(123,104,238,0.7); } 50%,64% { stroke: rgba(230,126,34,0.7); }
    67%,80% { stroke: rgba(59,130,246,0.7); } 83%,97% { stroke: rgba(8,145,178,0.7); }
    100% { stroke: rgba(64,145,108,0.7); }
  }
  @keyframes m-fpdim-anim {
    0%,14% { stroke: rgba(64,145,108,0.3); } 17%,30% { stroke: rgba(220,38,38,0.3); }
    33%,47% { stroke: rgba(123,104,238,0.3); } 50%,64% { stroke: rgba(230,126,34,0.3); }
    67%,80% { stroke: rgba(59,130,246,0.3); } 83%,97% { stroke: rgba(8,145,178,0.3); }
    100% { stroke: rgba(64,145,108,0.3); }
  }

  .m-scan {
    position: absolute; left: 16%; right: 16%; height: 2px;
    animation: m-scan-pos 3s ease-in-out infinite, m-scan-color 18s ease-in-out infinite;
  }
  @keyframes m-scan-pos { 0% { top: 22%; opacity: 0; } 8% { opacity: 1; } 92% { opacity: 1; } 100% { top: 72%; opacity: 0; } }
  @keyframes m-scan-color {
    0%,14% { background: linear-gradient(90deg,transparent,#40916C,transparent); box-shadow: 0 0 10px rgba(64,145,108,0.4); }
    17%,30% { background: linear-gradient(90deg,transparent,#DC2626,transparent); box-shadow: 0 0 10px rgba(220,38,38,0.4); }
    33%,47% { background: linear-gradient(90deg,transparent,#7B68EE,transparent); box-shadow: 0 0 10px rgba(123,104,238,0.4); }
    50%,64% { background: linear-gradient(90deg,transparent,#E67E22,transparent); box-shadow: 0 0 10px rgba(230,126,34,0.4); }
    67%,80% { background: linear-gradient(90deg,transparent,#3B82F6,transparent); box-shadow: 0 0 10px rgba(59,130,246,0.4); }
    83%,97% { background: linear-gradient(90deg,transparent,#0891B2,transparent); box-shadow: 0 0 10px rgba(8,145,178,0.4); }
  }

  .vault-morph-labels { position: relative; height: 16px; }
  .m-label {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    opacity: 0; animation: m-label-show 18s ease-in-out infinite;
  }
  /* Each product is visible for 3s out of 18s total = 16.67% per product */
  /* Colors in m-bg-anim: 0-14% = Comply, 17-30% = Risk, 33-47% = Policy, 50-64% = Awareness, 67-80% = Data Privacy, 83-97% = Quality */
  .m-label:nth-child(1) { color: #40916C; }
  .m-label:nth-child(2) { color: #DC2626; }
  .m-label:nth-child(3) { color: #7B68EE; }
  .m-label:nth-child(4) { color: #E67E22; }
  .m-label:nth-child(5) { color: #3B82F6; }
  .m-label:nth-child(6) { color: #0891B2; }
  .m-label { animation: none; }
  .m-label:nth-child(1) { animation: m-l1 18s ease-in-out infinite; }
  .m-label:nth-child(2) { animation: m-l2 18s ease-in-out infinite; }
  .m-label:nth-child(3) { animation: m-l3 18s ease-in-out infinite; }
  .m-label:nth-child(4) { animation: m-l4 18s ease-in-out infinite; }
  .m-label:nth-child(5) { animation: m-l5 18s ease-in-out infinite; }
  .m-label:nth-child(6) { animation: m-l6 18s ease-in-out infinite; }
  @keyframes m-l1 { 0%,1% { opacity:0; } 3%,13% { opacity:1; } 15%,100% { opacity:0; } }
  @keyframes m-l2 { 0%,17% { opacity:0; } 19%,29% { opacity:1; } 31%,100% { opacity:0; } }
  @keyframes m-l3 { 0%,33% { opacity:0; } 35%,46% { opacity:1; } 48%,100% { opacity:0; } }
  @keyframes m-l4 { 0%,50% { opacity:0; } 52%,63% { opacity:1; } 65%,100% { opacity:0; } }
  @keyframes m-l5 { 0%,67% { opacity:0; } 69%,79% { opacity:1; } 81%,100% { opacity:0; } }
  @keyframes m-l6 { 0%,83% { opacity:0; } 85%,96% { opacity:1; } 98%,100% { opacity:0; } }

  .vault-name { font-size: 32px; font-weight: 200; color: white; letter-spacing: 8px; text-transform: uppercase; }
  .vault-name .gold { color: #D4A843; font-weight: 400; }
  .vault-product { font-size: 10px; letter-spacing: 6px; color: rgba(212,168,67,0.5); margin-top: 6px; text-transform: uppercase; }
  .vault-full-name { font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 10px; letter-spacing: 2px; font-weight: 300; }

  .vault-form { margin-top: 40px; text-align: left; }
  .vault-field { margin-bottom: 16px; position: relative; }
  .vault-label { display: block; font-size: 9px; font-weight: 600; color: rgba(212,168,67,0.4); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .vault-input {
    width: 100%; padding: 16px 18px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    font-size: 15px; color: white; outline: none; font-family: 'Inter';
    transition: all 0.3s;
  }
  .vault-input::placeholder { color: rgba(255,255,255,0.2); }
  .vault-input:focus {
    border-color: rgba(212,168,67,0.5);
    box-shadow: 0 0 0 4px rgba(212,168,67,0.08), inset 0 0 20px rgba(212,168,67,0.03);
    background: rgba(255,255,255,0.08);
  }

  .vault-btn {
    width: 100%; padding: 16px; border: none;
    border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter'; letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(135deg, rgba(212,168,67,0.9), rgba(184,146,46,0.9));
    color: #1B4332; transition: all 0.4s; margin-top: 8px;
    box-shadow: 0 4px 20px rgba(212,168,67,0.2);
  }
  .vault-btn:hover {
    box-shadow: 0 8px 40px rgba(212,168,67,0.35);
    transform: translateY(-2px);
  }

  .vault-forgot { text-align: center; margin-top: 16px; }
  .vault-forgot a { font-size: 11px; color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s; }
  .vault-forgot a:hover { color: rgba(212,168,67,0.6); }

  .vault-footer {
    position: absolute; bottom: 24px; left: 0; right: 0; z-index: 1;
    display: flex; justify-content: center; gap: 32px;
  }
  .vault-trust { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .vault-trust-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(212,168,67,0.5); }

  /* ============================================================ */
  /* CONCEPT E — CONSTELLATION                                     */
  /* ============================================================ */
  .constellation {
    flex-direction: row; background: #0B1A12; position: relative;
  }

  .cst-left {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    padding: 60px; position: relative; overflow: hidden;
  }

  /* Canvas for particles */
  .cst-canvas { position: absolute; inset: 0; }

  .cst-brand { position: relative; z-index: 1; }
  .cst-logo-row { display: flex; align-items: center; gap: 14px; margin-bottom: 48px; }
  .cst-logo-shield { width: 48px; height: 56px; }
  .cst-logo-shield svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(212,168,67,0.2)); }
  .cst-logo-name { font-size: 24px; font-weight: 800; color: white; }
  .cst-logo-name .g { color: #D4A843; }

  .cst-headline { font-size: 42px; font-weight: 200; color: white; line-height: 1.2; letter-spacing: -1px; }
  .cst-headline strong { font-weight: 700; }
  .cst-headline em { font-style: normal; color: #D4A843; font-weight: 400; }
  .cst-sub { font-size: 14px; color: rgba(255,255,255,0.3); margin-top: 20px; line-height: 1.7; max-width: 400px; }

  .cst-metrics { display: flex; gap: 32px; margin-top: 48px; position: relative; z-index: 1; }
  .cst-metric { }
  .cst-metric-val { font-size: 28px; font-weight: 800; color: #D4A843; }
  .cst-metric-lbl { font-size: 9px; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }

  .cst-right {
    width: 460px; display: flex; align-items: center; justify-content: center;
    position: relative; flex-shrink: 0;
  }
  .cst-right::before {
    content: ''; position: absolute; left: 0; top: 10%; bottom: 10%;
    width: 1px; background: linear-gradient(to bottom, transparent, rgba(212,168,67,0.2), transparent);
  }

  .cst-form { width: 340px; }
  .cst-form-title { font-size: 18px; font-weight: 600; color: white; margin-bottom: 6px; }
  .cst-form-sub { font-size: 13px; color: rgba(255,255,255,0.25); margin-bottom: 32px; }

  .cst-field { margin-bottom: 20px; }
  .cst-field-label { display: block; font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .cst-input {
    width: 100%; padding: 16px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    font-size: 14px; color: white; outline: none; font-family: 'Inter'; transition: all 0.3s;
  }
  .cst-input::placeholder { color: rgba(255,255,255,0.12); }
  .cst-input:focus { border-color: rgba(212,168,67,0.4); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(212,168,67,0.05); }

  .cst-btn {
    width: 100%; padding: 16px; background: linear-gradient(135deg, #1B4332, #2D6A4F);
    border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
    color: white; cursor: pointer; font-family: 'Inter'; transition: all 0.3s;
    position: relative; overflow: hidden; margin-top: 8px;
  }
  .cst-btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,0.15), transparent);
    transition: left 0.5s;
  }
  .cst-btn:hover::before { left: 100%; }
  .cst-btn:hover { box-shadow: 0 12px 40px rgba(27,67,50,0.4); transform: translateY(-2px); }

  .cst-or { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .cst-or::before, .cst-or::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
  .cst-or span { font-size: 10px; color: rgba(255,255,255,0.15); }

  .cst-sso {
    width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; background: transparent; font-size: 12px;
    color: rgba(255,255,255,0.3); cursor: pointer; font-family: 'Inter'; transition: all 0.2s;
  }
  .cst-sso:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }

  .cst-form-footer { text-align: center; margin-top: 20px; font-size: 10px; color: rgba(255,255,255,0.12); }

  /* ============================================================ */
  /* CONCEPT F — MINIMAL LUXURY                                    */
  /* ============================================================ */
  .luxury {
    align-items: center; justify-content: center; background: #060606;
    position: relative;
  }

  .lux-bg-line {
    position: absolute; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,67,0.08), transparent);
  }
  .lux-bg-line-1 { top: 30%; left: 0; right: 0; }
  .lux-bg-line-2 { top: 70%; left: 0; right: 0; }
  .lux-bg-line-v {
    position: absolute; width: 1px; background: linear-gradient(to bottom, transparent, rgba(212,168,67,0.06), transparent);
  }
  .lux-bg-line-v1 { left: 30%; top: 0; bottom: 0; }
  .lux-bg-line-v2 { right: 30%; top: 0; bottom: 0; }

  .lux-content { position: relative; z-index: 1; text-align: center; width: 340px; }

  .lux-trema {
    font-size: 64px; font-weight: 200; color: #D4A843; margin-bottom: 24px; line-height: 1;
    text-shadow: 0 0 60px rgba(212,168,67,0.3);
  }
  .lux-name { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.5); letter-spacing: 12px; text-transform: uppercase; margin-bottom: 48px; }

  .lux-field { margin-bottom: 0; position: relative; }
  .lux-input {
    width: 100%; padding: 18px 0; background: transparent;
    border: none; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 15px; color: white; outline: none; font-family: 'Inter';
    transition: all 0.3s; text-align: center; letter-spacing: 1px;
  }
  .lux-input::placeholder { color: rgba(255,255,255,0.1); letter-spacing: 2px; font-weight: 300; }
  .lux-input:focus { border-bottom-color: rgba(212,168,67,0.4); }
  .lux-input-glow {
    width: 0; height: 1px; background: #D4A843; margin: 0 auto;
    transition: width 0.4s; box-shadow: 0 0 10px rgba(212,168,67,0.3);
  }
  .lux-field:focus-within .lux-input-glow { width: 100%; }

  .lux-spacer { height: 32px; }

  .lux-btn {
    width: 180px; padding: 14px 0; border: 1px solid rgba(212,168,67,0.3);
    background: transparent; border-radius: 99px; font-size: 11px; font-weight: 500;
    color: #D4A843; cursor: pointer; font-family: 'Inter'; letter-spacing: 4px;
    text-transform: uppercase; transition: all 0.4s; margin-top: 40px;
  }
  .lux-btn:hover {
    background: rgba(212,168,67,0.08); border-color: #D4A843;
    box-shadow: 0 0 50px rgba(212,168,67,0.1);
    transform: scale(1.02);
  }

  .lux-shield-watermark {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 300px; height: 360px; opacity: 0.015; z-index: 0;
  }
  .lux-shield-watermark svg { width: 100%; height: 100%; }

  .lux-footer {
    position: absolute; bottom: 28px; left: 0; right: 0; text-align: center; z-index: 1;
    font-size: 9px; color: rgba(255,255,255,0.08); letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- ============ THE VAULT — Gëstu ETP ============ -->
<div class="screen vault">
  <div class="vault-grid"></div>
  <div class="vault-glow"></div>

  <div class="vault-content">
    <div class="vault-morph">
      <div class="vault-morph-shield">
        <svg viewBox="0 0 44 52" fill="none">
          <path class="m-bg" d="M22 3L4 11V23C4 36.5 22 48 22 48C22 48 40 36.5 40 23V11L22 3Z" stroke-width="1.2"/>
          <path class="m-stroke" d="M22 3L4 11V23C4 36.5 22 48 22 48C22 48 40 36.5 40 23V11L22 3Z" fill="none" stroke-width="1.2"/>
          <path class="m-fp" d="M22 16C18 16 15 19 15 23" stroke-width="1.8" stroke-linecap="round"/>
          <path class="m-fp-dim" d="M22 13C16 13 12 17.5 12 23.5" stroke-width="1.8" stroke-linecap="round"/>
          <path class="m-fp" d="M22 19C20 19 18 20.5 18 23.5V29" stroke-width="1.8" stroke-linecap="round"/>
          <path class="m-fp" d="M22 16C26 16 29 19 29 23V27" stroke-width="1.8" stroke-linecap="round"/>

        <div class="m-scan"></div>

      <div class="vault-morph-labels">

        <span class="m-label">Quality</span>

    </div>

    <div class="vault-name">G<span class="gold">&euml;</span>STU</div>

    <div class="vault-form">

        <label class="vault-label">Cl&eacute; d&rsquo;acc&egrave;s</label>

      <div class="vault-forgot"><a href="#">Mot de passe oubli&eacute; ?</a></div>
    </div>
  </div>

  <div class="vault-footer">
    <span class="vault-trust"><span class="vault-trust-dot"></span> Chiffrement AES-256</span>
    <span class="vault-trust"><span class="vault-trust-dot"></span> Multi-produits</span>
    <span class="vault-trust"><span class="vault-trust-dot"></span> IA int&eacute;gr&eacute;e</span>
    <span class="vault-trust"><span class="vault-trust-dot"></span> H&eacute;berg&eacute; en Europe</span>
  </div>
</div>


</body>
</html>
