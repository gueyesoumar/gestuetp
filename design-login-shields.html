<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&euml;stu ETP &mdash; Shield Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: #000; }
  .tab-bar { display: flex; background: #0a0a0a; padding: 0 20px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .tab-btn { padding: 14px 24px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.3); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-family: 'Inter'; letter-spacing: 0.5px; }
  .tab-btn:hover { color: rgba(255,255,255,0.6); }
  .tab-btn.active { color: #D4A843; border-bottom-color: #D4A843; }
  .screen { display: none; flex: 1; overflow: hidden; position: relative; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0D1F15 0%, #1B4332 45%, #173D2E 100%);
  }
  .screen.active { display: flex; }
  .screen::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='240' height='240' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 24 L192 60 L186 156 L120 204 L54 156 L48 60 Z' fill='none' stroke='rgba(212,168,67,0.02)' stroke-width='1'/%3E%3C/svg%3E");
    background-size: 240px 240px;
  }
  .demo-wrap { position: relative; z-index: 1; text-align: center; }
  .demo-title { font-size: 32px; font-weight: 200; color: white; letter-spacing: 8px; text-transform: uppercase; margin-top: 24px; }
  .demo-title .g { color: #D4A843; font-weight: 400; }
  .demo-sub { font-size: 10px; letter-spacing: 5px; color: rgba(212,168,67,0.45); text-transform: uppercase; margin-top: 6px; }

  /* Shield base path */
  .shield-path { fill: none; stroke-width: 1.2; }
  .fp1 { stroke-linecap: round; stroke-width: 1.5; }
  .fp2 { stroke-linecap: round; stroke-width: 1.5; opacity: 0.4; }

  /* ============================================================ */
  /* A — ORBITE PLAN&Eacute;TAIRE                                      */
  /* ============================================================ */
  .orbit-area { width: 280px; height: 280px; position: relative; margin: 0 auto; }

  /* Center shield */
  .orbit-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 72px; height: 86px; z-index: 10; }
  .orbit-center svg { width: 100%; height: 100%; filter: drop-shadow(0 0 30px rgba(212,168,67,0.3)); }
  .orbit-center .scan { position: absolute; left: 18%; right: 18%; height: 2px; background: linear-gradient(90deg, transparent, #D4A843, transparent); box-shadow: 0 0 12px rgba(212,168,67,0.5); animation: oscan 3s ease-in-out infinite; }
  @keyframes oscan { 0% { top: 22%; opacity: 0; } 8% { opacity: 1; } 92% { opacity: 1; } 100% { top: 72%; opacity: 0; } }

  /* Orbit ring (visual) */
  .orbit-ring { position: absolute; inset: 10px; border: 1px solid rgba(212,168,67,0.06); border-radius: 50%; }
  .orbit-ring-2 { position: absolute; inset: 40px; border: 1px dashed rgba(212,168,67,0.04); border-radius: 50%; }

  /* Orbiting shields */
  .orbit-track { position: absolute; inset: 0; animation: orbit-rotate 20s linear infinite; }
  .orbit-item {
    position: absolute; width: 40px; height: 48px;
    transition: transform 0.3s, filter 0.3s;
  }
  .orbit-item svg { width: 100%; height: 100%; }
  /* Position 6 items around the ellipse */
  .orbit-item:nth-child(1) { top: -4px; left: 50%; margin-left: -20px; }
  .orbit-item:nth-child(2) { top: 18%; right: -2px; }
  .orbit-item:nth-child(3) { bottom: 18%; right: -2px; }
  .orbit-item:nth-child(4) { bottom: -4px; left: 50%; margin-left: -20px; }
  .orbit-item:nth-child(5) { bottom: 18%; left: -2px; }
  .orbit-item:nth-child(6) { top: 18%; left: -2px; }

  /* Trail effect */
  .orbit-item::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 30px; height: 2px;
    transform: translate(-50%, -50%) rotate(var(--trail-angle, 0deg));
    background: linear-gradient(90deg, var(--c), transparent);
    opacity: 0.3; filter: blur(2px); border-radius: 2px;
  }
  .orbit-item:nth-child(1) { --trail-angle: 90deg; --c: #40916C; }
  .orbit-item:nth-child(2) { --trail-angle: 150deg; --c: #DC2626; }
  .orbit-item:nth-child(3) { --trail-angle: 210deg; --c: #7B68EE; }
  .orbit-item:nth-child(4) { --trail-angle: 270deg; --c: #E67E22; }
  .orbit-item:nth-child(5) { --trail-angle: 330deg; --c: #3B82F6; }
  .orbit-item:nth-child(6) { --trail-angle: 30deg; --c: #0891B2; }

  /* Counter-rotate items to keep them upright */
  .orbit-item svg { animation: orbit-counter 20s linear infinite; }
  @keyframes orbit-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes orbit-counter { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }

  /* Product name cycle */
  .orbit-labels { margin-top: 8px; height: 16px; position: relative; }
  .orbit-label {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    opacity: 0; animation: olabel 20s linear infinite;
  }
  .orbit-label:nth-child(1) { color: #40916C; animation-delay: 0s; }
  .orbit-label:nth-child(2) { color: #DC2626; animation-delay: -3.33s; }
  .orbit-label:nth-child(3) { color: #7B68EE; animation-delay: -6.66s; }
  .orbit-label:nth-child(4) { color: #E67E22; animation-delay: -10s; }
  .orbit-label:nth-child(5) { color: #3B82F6; animation-delay: -13.33s; }
  .orbit-label:nth-child(6) { color: #0891B2; animation-delay: -16.66s; }
  @keyframes olabel { 0%,12% { opacity: 1; } 17%,100% { opacity: 0; } }

  /* ============================================================ */
  /* B — HEXAGONE PULSANT                                          */
  /* ============================================================ */
  .hex-area { width: 280px; height: 280px; position: relative; margin: 0 auto; }

  .hex-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 68px; height: 82px; z-index: 10; }
  .hex-center svg { width: 100%; height: 100%; filter: drop-shadow(0 0 24px rgba(212,168,67,0.25)); }
  .hex-center .scan { position: absolute; left: 18%; right: 18%; height: 2px; background: linear-gradient(90deg, transparent, #D4A843, transparent); box-shadow: 0 0 12px rgba(212,168,67,0.5); animation: oscan 3s ease-in-out infinite; }

  /* Connection lines (SVG) */
  .hex-lines { position: absolute; inset: 0; z-index: 1; }

  .hex-item {
    position: absolute; width: 44px; height: 52px; z-index: 5;
    transition: all 0.3s;
  }
  .hex-item svg { width: 100%; height: 100%; transition: filter 0.3s; }

  /* Hexagonal positions */
  .hex-item:nth-child(1) { top: 6px; left: 50%; margin-left: -22px; } /* top */
  .hex-item:nth-child(2) { top: 25%; right: 12px; } /* top-right */
  .hex-item:nth-child(3) { bottom: 25%; right: 12px; } /* bottom-right */
  .hex-item:nth-child(4) { bottom: 6px; left: 50%; margin-left: -22px; } /* bottom */
  .hex-item:nth-child(5) { bottom: 25%; left: 12px; } /* bottom-left */
  .hex-item:nth-child(6) { top: 25%; left: 12px; } /* top-left */

  /* Sequential pulse animation */
  .hex-item { animation: hex-pulse 12s ease-in-out infinite; }
  .hex-item:nth-child(1) { animation-delay: 0s; }
  .hex-item:nth-child(2) { animation-delay: -2s; }
  .hex-item:nth-child(3) { animation-delay: -4s; }
  .hex-item:nth-child(4) { animation-delay: -6s; }
  .hex-item:nth-child(5) { animation-delay: -8s; }
  .hex-item:nth-child(6) { animation-delay: -10s; }
  @keyframes hex-pulse {
    0%, 85%, 100% { transform: scale(1); filter: brightness(1); }
    10%, 20% { transform: scale(1.25); filter: brightness(1.5) drop-shadow(0 0 16px var(--hc)); }
  }
  .hex-item:nth-child(1) { --hc: rgba(64,145,108,0.5); }
  .hex-item:nth-child(2) { --hc: rgba(220,38,38,0.5); }
  .hex-item:nth-child(3) { --hc: rgba(123,104,238,0.5); }
  .hex-item:nth-child(4) { --hc: rgba(230,126,34,0.5); }
  .hex-item:nth-child(5) { --hc: rgba(59,130,246,0.5); }
  .hex-item:nth-child(6) { --hc: rgba(8,145,178,0.5); }

  /* Connection line glow */
  .hex-line { stroke: rgba(212,168,67,0.06); stroke-width: 1; transition: all 0.3s; }
  .hex-line-glow { stroke-width: 2; opacity: 0; animation: line-glow 12s ease-in-out infinite; }
  .hex-line-glow:nth-child(2) { stroke: #40916C; animation-delay: 0s; }
  .hex-line-glow:nth-child(4) { stroke: #DC2626; animation-delay: -2s; }
  .hex-line-glow:nth-child(6) { stroke: #7B68EE; animation-delay: -4s; }
  .hex-line-glow:nth-child(8) { stroke: #E67E22; animation-delay: -6s; }
  .hex-line-glow:nth-child(10) { stroke: #3B82F6; animation-delay: -8s; }
  .hex-line-glow:nth-child(12) { stroke: #0891B2; animation-delay: -10s; }
  @keyframes line-glow { 0%,85%,100% { opacity: 0; } 10%,20% { opacity: 0.6; } }

  .hex-labels { margin-top: 8px; height: 16px; position: relative; }
  .hex-label {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    opacity: 0; animation: olabel 12s linear infinite;
  }
  .hex-label:nth-child(1) { color: #40916C; animation-delay: 0s; }
  .hex-label:nth-child(2) { color: #DC2626; animation-delay: -2s; }
  .hex-label:nth-child(3) { color: #7B68EE; animation-delay: -4s; }
  .hex-label:nth-child(4) { color: #E67E22; animation-delay: -6s; }
  .hex-label:nth-child(5) { color: #3B82F6; animation-delay: -8s; }
  .hex-label:nth-child(6) { color: #0891B2; animation-delay: -10s; }

  /* ============================================================ */
  /* C — MORPHING                                                  */
  /* ============================================================ */
  .morph-area { width: 120px; height: 144px; position: relative; margin: 0 auto; }
  .morph-shield { width: 100%; height: 100%; position: relative; }
  .morph-shield svg { width: 100%; height: 100%; }

  /* Animated color transitions */
  .morph-shield .shield-bg { animation: morph-bg 18s ease-in-out infinite; }
  .morph-shield .fp-main { animation: morph-fp 18s ease-in-out infinite; }
  .morph-shield .fp-dim { animation: morph-fp-dim 18s ease-in-out infinite; }
  .morph-shield .shield-stroke { animation: morph-stroke 18s ease-in-out infinite; }

  @keyframes morph-bg {
    0%,14% { fill: rgba(64,145,108,0.15); }
    17%,30% { fill: rgba(220,38,38,0.12); }
    33%,47% { fill: rgba(123,104,238,0.12); }
    50%,64% { fill: rgba(230,126,34,0.1); }
    67%,80% { fill: rgba(59,130,246,0.1); }
    83%,97% { fill: rgba(8,145,178,0.1); }
    100% { fill: rgba(64,145,108,0.15); }
  }
  @keyframes morph-stroke {
    0%,14% { stroke: #40916C; }
    17%,30% { stroke: #DC2626; }
    33%,47% { stroke: #7B68EE; }
    50%,64% { stroke: #E67E22; }
    67%,80% { stroke: #3B82F6; }
    83%,97% { stroke: #0891B2; }
    100% { stroke: #40916C; }
  }
  @keyframes morph-fp {
    0%,14% { stroke: rgba(64,145,108,0.7); }
    17%,30% { stroke: rgba(220,38,38,0.7); }
    33%,47% { stroke: rgba(123,104,238,0.7); }
    50%,64% { stroke: rgba(230,126,34,0.7); }
    67%,80% { stroke: rgba(59,130,246,0.7); }
    83%,97% { stroke: rgba(8,145,178,0.7); }
    100% { stroke: rgba(64,145,108,0.7); }
  }
  @keyframes morph-fp-dim {
    0%,14% { stroke: rgba(64,145,108,0.3); }
    17%,30% { stroke: rgba(220,38,38,0.3); }
    33%,47% { stroke: rgba(123,104,238,0.3); }
    50%,64% { stroke: rgba(230,126,34,0.3); }
    67%,80% { stroke: rgba(59,130,246,0.3); }
    83%,97% { stroke: rgba(8,145,178,0.3); }
    100% { stroke: rgba(64,145,108,0.3); }
  }

  .morph-scan {
    position: absolute; left: 16%; right: 16%; height: 2px;
    animation: oscan 3s ease-in-out infinite, morph-scan-color 18s ease-in-out infinite;
  }
  @keyframes morph-scan-color {
    0%,14% { background: linear-gradient(90deg,transparent,#40916C,transparent); box-shadow: 0 0 12px rgba(64,145,108,0.5); }
    17%,30% { background: linear-gradient(90deg,transparent,#DC2626,transparent); box-shadow: 0 0 12px rgba(220,38,38,0.5); }
    33%,47% { background: linear-gradient(90deg,transparent,#7B68EE,transparent); box-shadow: 0 0 12px rgba(123,104,238,0.5); }
    50%,64% { background: linear-gradient(90deg,transparent,#E67E22,transparent); box-shadow: 0 0 12px rgba(230,126,34,0.5); }
    67%,80% { background: linear-gradient(90deg,transparent,#3B82F6,transparent); box-shadow: 0 0 12px rgba(59,130,246,0.5); }
    83%,97% { background: linear-gradient(90deg,transparent,#0891B2,transparent); box-shadow: 0 0 12px rgba(8,145,178,0.5); }
  }

  .morph-glow {
    position: absolute; inset: -30px; border-radius: 50%;
    animation: morph-glow-color 18s ease-in-out infinite;
    filter: blur(40px); opacity: 0.15;
  }
  @keyframes morph-glow-color {
    0%,14% { background: #40916C; } 17%,30% { background: #DC2626; }
    33%,47% { background: #7B68EE; } 50%,64% { background: #E67E22; }
    67%,80% { background: #3B82F6; } 83%,97% { background: #0891B2; }
    100% { background: #40916C; }
  }

  .morph-labels { margin-top: 16px; height: 16px; position: relative; }
  .morph-label {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    opacity: 0; animation: morph-label-show 18s ease-in-out infinite;
  }
  .morph-label:nth-child(1) { color: #40916C; animation-delay: 0s; }
  .morph-label:nth-child(2) { color: #DC2626; animation-delay: -3s; }
  .morph-label:nth-child(3) { color: #7B68EE; animation-delay: -6s; }
  .morph-label:nth-child(4) { color: #E67E22; animation-delay: -9s; }
  .morph-label:nth-child(5) { color: #3B82F6; animation-delay: -12s; }
  .morph-label:nth-child(6) { color: #0891B2; animation-delay: -15s; }
  @keyframes morph-label-show {
    0%,2% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    5%,12% { opacity: 1; transform: translateX(-50%) translateY(0); }
    15%,100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
  }
</style>
</head>

<!-- ============ B: HEXAGONE ============ -->
<div class="screen">
  <div class="demo-wrap">
    <div class="hex-area">
      <svg class="hex-lines" viewBox="0 0 280 280">
        <line class="hex-line" x1="140" y1="140" x2="140" y2="32"/>
        <line class="hex-line hex-line-glow" x1="140" y1="140" x2="140" y2="32"/>
        <line class="hex-line" x1="140" y1="140" x2="246" y2="86"/>
        <line class="hex-line hex-line-glow" x1="140" y1="140" x2="246" y2="86"/>
        <line class="hex-line" x1="140" y1="140" x2="246" y2="194"/>
        <line class="hex-line hex-line-glow" x1="140" y1="140" x2="246" y2="194"/>
        <line class="hex-line" x1="140" y1="140" x2="140" y2="248"/>
